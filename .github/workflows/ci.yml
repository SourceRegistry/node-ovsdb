name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build the package
        run: npm run build
      - name: Smoke test CLI
        run: node bin/ovsdb-generate.cjs --help
      - name: Smoke test CLI generation
        run: |
          mkdir -p tmp
          node bin/ovsdb-generate.cjs --schema ./tests/fixtures/openvswitch.schema.json --out ./tmp/ovsdb.generated.ts --name GeneratedDb
          test -f ./tmp/ovsdb.generated.ts
          grep 'export interface GeneratedDb' ./tmp/ovsdb.generated.ts
      - name: Start OVSDB integration stack
        run: docker compose -f docker-compose.integration.yml up -d --build
      - name: Run integration tests
        env:
          OVSDB_INTEGRATION: "1"
          OVSDB_HOST: "127.0.0.1"
          OVSDB_PORT: "6640"
        run: npm run test:integration
      - name: Stop OVSDB integration stack
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"
      - name: Install dependencies
        run: npm install
      - name: Restore tracked files
        run: git restore .
      - name: Build the package
        run: npm run build
      - name: Run semantic-release
        run: npx semantic-release

  deploy-docs:
    name: Deploy Docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build documentation
        run: npm run docs:build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./generated/docs
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
